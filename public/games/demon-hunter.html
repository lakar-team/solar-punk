        // --- NEW: Firework System ---
        function createFirework(x, y, z) {
            // Random Color
            const color = Math.random() * 0xffffff;
            const particleCount = 20;
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            
            for(let i=0; i<particleCount; i++) {
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, y, z);
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const speed = 0.5 + Math.random() * 0.5;
                
                const vel = new THREE.Vector3(
                    speed * Math.sin(phi) * Math.cos(theta),
                    speed * Math.sin(phi) * Math.sin(theta),
                    speed * Math.cos(phi)
                );
                
                scene.add(mesh);
                fireworks.push({ mesh: mesh, vel: vel, life: 60 });
            }
        }
        
        function updateFireworks() {
            for(let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                fw.life--;
                fw.mesh.position.add(fw.vel);
                fw.vel.y -= 0.01; // Gravity
                fw.mesh.rotation.x += 0.1;
                fw.mesh.scale.multiplyScalar(0.96); // Shrink
                
                if (fw.life <= 0) {
                    scene.remove(fw.mesh);
                    fireworks.splice(i, 1);
                }
            }
        }

        // --- Mobile Controls (UPDATED FOR MOUSE SUPPORT) ---
        function setupMobileControls() {
            const btnJump = document.getElementById('btn-jump');
            const btnAtk = document.getElementById('btn-attack');
            const btnSmash = document.getElementById('btn-smash');

            // Helper to add both touch and mouse events
            function addPressEvents(el, callback) {
                el.addEventListener('touchstart', (e) => { e.preventDefault(); callback(true); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); callback(false); });
                el.addEventListener('mousedown', (e) => { e.preventDefault(); callback(true); });
                el.addEventListener('mouseup', (e) => { e.preventDefault(); callback(false); });
                el.addEventListener('mouseleave', (e) => { if(el.dataset.pressed) callback(false); });
            }

            addPressEvents(btnJump, (pressed) => {
                keyState['Space'] = pressed;
                btnJump.dataset.pressed = pressed ? "true" : "";
            });
            
            // For one-shot actions like attack, we trigger on press start
            btnAtk.addEventListener('touchstart', (e) => { e.preventDefault(); triggerAttack(); });
            btnAtk.addEventListener('mousedown', (e) => { e.preventDefault(); triggerAttack(); });

            btnSmash.addEventListener('touchstart', (e) => { e.preventDefault(); triggerSmash(); });
            btnSmash.addEventListener('mousedown', (e) => { e.preventDefault(); triggerSmash(); });

            const joystickArea = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            let joyStartX = 0, joyStartY = 0;
            let joyActive = false;

            function startJoystick(clientX, clientY) {
                joyActive = true;
                const rect = joystickArea.getBoundingClientRect();
                joyStartX = rect.left + rect.width / 2;
                joyStartY = rect.top + rect.height / 2;
                updateJoystick(clientX, clientY);
            }

            function moveJoystick(clientX, clientY) {
                if (joyActive) updateJoystick(clientX, clientY);
            }

            function endJoystick() {
                joyActive = false;
                stick.style.transform = `translate(-50%, -50%)`;
                keyState['KeyW'] = false; keyState['KeyS'] = false;
                keyState['KeyA'] = false; keyState['KeyD'] = false;
            }

            // Touch events
            joystickArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startJoystick(e.touches[0].clientX, e.touches[0].clientY);
            });
            joystickArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                moveJoystick(e.touches[0].clientX, e.touches[0].clientY);
            });
            joystickArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                endJoystick();
            });

            // Mouse events for joystick
            joystickArea.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startJoystick(e.clientX, e.clientY);
            });
            document.addEventListener('mousemove', (e) => {
                if(joyActive) {
                     e.preventDefault();
                     moveJoystick(e.clientX, e.clientY);
                }
            });
            document.addEventListener('mouseup', (e) => {
                if(joyActive) {
                    e.preventDefault();
                    endJoystick();
                }
            });

            function updateJoystick(clientX, clientY) {
                const maxDist = 40;
                let dx = clientX - joyStartX;
                let dy = clientY - joyStartY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxDist);
                const angle = Math.atan2(dy, dx);
                
                const moveX = Math.cos(angle) * dist;
                const moveY = Math.sin(angle) * dist;
                stick.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;

                keyState['KeyW'] = (Math.sin(angle) < -0.3);
                keyState['KeyS'] = (Math.sin(angle) > 0.3);
                keyState['KeyA'] = (Math.cos(angle) < -0.3);
                keyState['KeyD'] = (Math.cos(angle) > 0.3);
            }

            let lastTouchX = 0, lastTouchY = 0;
            document.addEventListener('touchstart', (e) => {
                if (e.target.tagName === 'CANVAS') {
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;
                }
            });
            document.addEventListener('touchmove', (e) => {
                if (e.target.tagName === 'CANVAS') {
                    if (e.touches[0].clientX > window.innerWidth / 2) {
                        const deltaX = e.touches[0].clientX - lastTouchX;
                        const deltaY = e.touches[0].clientY - lastTouchY;
                        cameraAngle -= deltaX * 0.01;
                        cameraVertical += deltaY * 0.01;
                        cameraVertical = Math.max(-0.5, Math.min(1.5, cameraVertical));
                        lastTouchX = e.touches[0].clientX;
                        lastTouchY = e.touches[0].clientY;
                    }
                }
            }, { passive: false });
        }

        // --- Helper: Get Terrain Height ---
        function getTerrainHeight(x, z) { return calculateTerrainHeight(x, z); }

        function calculateTerrainHeight(x, z) {
            const largeHills = Math.sin(x * 0.05) * 1.5 + Math.cos(z * 0.05) * 1.5;
            const smallBumps = Math.sin(z * 0.2) * 0.3 + Math.cos(x * 0.2) * 0.3;
            return largeHills + smallBumps;
        }

        function generateAnimeGroundTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#2d6e32'; ctx.fillRect(0, 0, 512, 512);
            for(let i=0; i<3000; i++) {
                const x = Math.random() * 512; const y = Math.random() * 512;
                const length = 10 + Math.random() * 20; const angle = Math.random() * Math.PI * 2;
                const cVal = Math.floor(Math.random() * 50); const green = 100 + cVal; 
                ctx.strokeStyle = `rgb(40, ${green}, 50)`;
                ctx.lineWidth = 2 + Math.random() * 3; ctx.globalAlpha = 0.6;
                ctx.beginPath(); ctx.moveTo(x, y);
                ctx.lineTo(x + Math.cos(angle) * length, y + Math.sin(angle) * length);
                ctx.stroke();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(12, 12); 
            return texture;
        }

        // --- World Generation ---
        function createEnvironment() {
            const moonGeo = new THREE.SphereGeometry(15, 32, 32);
            const moonMat = new THREE.MeshBasicMaterial({ color: 0xffff88 });
            const moon = new THREE.Mesh(moonGeo, moonMat);
            moon.position.set(-60, 80, -60);
            scene.add(moon);
            
            const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
            const cloudGeo = new THREE.SphereGeometry(6, 8, 8);
            for(let i=0; i<15; i++) {
                const cloud = new THREE.Group();
                for(let j=0; j<3; j++) {
                    const puff = new THREE.Mesh(cloudGeo, cloudMat);
                    puff.position.x = (j-1) * 5;
                    puff.scale.set(1 + Math.random(), 0.6 + Math.random() * 0.4, 1);
                    cloud.add(puff);
                }
                cloud.position.set((Math.random() - 0.5) * 300, 40 + Math.random() * 20, (Math.random() - 0.5) * 300);
                scene.add(cloud);
            }

            const groundTex = generateAnimeGroundTexture();
            const planeGeometry = new THREE.PlaneGeometry(300, 300, 128, 128); 
            const posAttribute = planeGeometry.attributes.position;
            for ( let i = 0; i < posAttribute.count; i ++ ) {
                const x = posAttribute.getX(i); const y = posAttribute.getY(i);
                posAttribute.setZ( i, calculateTerrainHeight(x, y) );
            }
            planeGeometry.computeVertexNormals();

            if (!window.gradientMap) {
                 const toonColors = new Uint8Array([80, 80, 80, 255, 160, 160, 160, 255, 255, 255, 255, 255]);
                window.gradientMap = new THREE.DataTexture(toonColors, 3, 1, THREE.RGBAFormat);
                window.gradientMap.minFilter = THREE.NearestFilter; window.gradientMap.magFilter = THREE.NearestFilter;
                window.gradientMap.needsUpdate = true;
            }

            const planeMaterial = new THREE.MeshToonMaterial({ color: 0xffffff, map: groundTex, gradientMap: window.gradientMap });
            const floor = new THREE.Mesh(planeGeometry, planeMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            terrainMesh = floor; 
            scene.add(floor);

            const rockGeo = new THREE.DodecahedronGeometry(4, 0); 
            const rockMat = new THREE.MeshToonMaterial({ color: 0x444444, gradientMap: window.gradientMap });
            const limit = config.mapLimit + 5;
            
            let rockCount = 0;
            for(let i = -limit; i <= limit; i+=6) rockCount += 4;
            
            const rockMesh = new THREE.InstancedMesh(rockGeo, rockMat, rockCount);
            let rIdx = 0;
            const dummy = new THREE.Object3D();

            const placeRock = (x, z) => {
                dummy.position.set(x, getTerrainHeight(x, z) + 1, z);
                dummy.scale.set(1 + Math.random(), 2 + Math.random(), 1 + Math.random());
                dummy.rotation.set(Math.random(), Math.random(), Math.random());
                dummy.updateMatrix();
                rockMesh.setMatrixAt(rIdx++, dummy.matrix);
            };

            for(let i = -limit; i <= limit; i+=6) {
                placeRock(limit, i); placeRock(-limit, i);
                placeRock(i, limit); placeRock(i, -limit);
            }
            scene.add(rockMesh);

            const treeTrunkMat = new THREE.MeshToonMaterial({ color: 0x4a3a2a, gradientMap: window.gradientMap });
            const treeLeafMat = new THREE.MeshToonMaterial({ color: 0x2a6a2a, gradientMap: window.gradientMap });
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3, 6); 
            const leafGeo = new THREE.SphereGeometry(2.0, 6, 6); 

            const treeCount = 80;
            const trunkMesh = new THREE.InstancedMesh(trunkGeo, treeTrunkMat, treeCount);
            const leafMesh = new THREE.InstancedMesh(leafGeo, treeLeafMat, treeCount * 3); 
            
            trunkMesh.castShadow = true; trunkMesh.receiveShadow = true;
            leafMesh.castShadow = true; leafMesh.receiveShadow = true;

            let lIdx = 0;

            for(let i=0; i<treeCount; i++) {
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 290; 
                    z = (Math.random() - 0.5) * 290;
                } while(Math.abs(x) < 10 && Math.abs(z) < 10);

                const groundY = calculateTerrainHeight(x, z) - 0.5;
                const heightScale = Math.random() * 0.5 + 0.8;

                dummy.position.set(x, groundY + (1.5 * heightScale), z);
                dummy.rotation.set(0, 0, 0);
                dummy.scale.set(1, heightScale, 1);
                dummy.updateMatrix();
                trunkMesh.setMatrixAt(i, dummy.matrix);

                const leafCenterY = groundY + (3.0 * heightScale);
                
                dummy.position.set(x, leafCenterY + 1.0, z);
                dummy.scale.set(1.2, 1.2, 1.2);
                dummy.updateMatrix();
                leafMesh.setMatrixAt(lIdx++, dummy.matrix);

                dummy.position.set(x - 1.0, leafCenterY, z + 0.5);
                dummy.scale.set(0.9, 0.9, 0.9);
                dummy.updateMatrix();
                leafMesh.setMatrixAt(lIdx++, dummy.matrix);

                dummy.position.set(x + 1.0, leafCenterY, z - 0.5);
                dummy.scale.set(0.9, 0.9, 0.9);
                dummy.updateMatrix();
                leafMesh.setMatrixAt(lIdx++, dummy.matrix);

                if (Math.random() < 0.15) { 
                    createAppleRing(x, leafCenterY + 1.5, z);
                }
            }
            scene.add(trunkMesh);
            scene.add(leafMesh);
            
            for(let i=0; i<2; i++) spawnSword('water'); 
            for(let i=0; i<2; i++) spawnSword('fire');  
            for(let i=0; i<10; i++) spawnDemon(false, false); 
        }

        // --- Apples ---
        function createAppleRing(x, y, z) {
            const ring = new THREE.Group();
            ring.position.set(x, y, z);
            ring.userData = { initialY: y, phase: Math.random() * Math.PI * 2 };

            const count = 6;
            const radius = 2.2; 

            for(let i=0; i<count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const ax = Math.cos(angle) * radius;
                const az = Math.sin(angle) * radius;
                
                const apple = new THREE.Mesh(appleGeo, appleMat);
                apple.position.set(ax, 0, az);
                
                const stem = new THREE.Mesh(appleStemGeo, appleStemMat);
                stem.position.y = 0.25;
                apple.add(stem);
                
                ring.add(apple);
            }

            scene.add(ring);
            apples.push(ring);
        }

        function updateApples() {
            if (!player) return;
            const time = Date.now() * 0.002;
            for (let i = apples.length - 1; i >= 0; i--) {
                const ring = apples[i];
                ring.position.y = ring.userData.initialY + Math.sin(time + ring.userData.phase) * 0.3;
                
                const dx = player.position.x - ring.position.x;
                const dz = player.position.z - ring.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                if (dist < 3.0) { 
                    healPlayer(config.maxHP * 0.2); 
                    AudioEngine.playTone(800, 'sine', 0.2, 0.1); // Eat sound
                    scene.remove(ring);
                    apples.splice(i, 1);
                }
            }
        }

        // --- Swords System ---
        function spawnSword(type) {
            const group = new THREE.Group();
            const color = type === 'water' ? 0x00ffff : 0xff4400;

            const bladeGeo = new THREE.BoxGeometry(0.08, 1.5, 0.05);
            const bladeMat = new THREE.MeshStandardMaterial({ 
                color: color, emissive: color, emissiveIntensity: 0.8 
            });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.y = 0.75;
            group.add(blade);
            
            const handleGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.4);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.y = -0.2;
            group.add(handle);
            
            const light = new THREE.PointLight(color, 1, 5);
            light.position.y = 0.5;
            group.add(light);

            const angle = Math.random() * Math.PI * 2;
            const dist = 60 + Math.random() * 80; 
            const x = Math.sin(angle) * dist;
            const z = Math.cos(angle) * dist;
            const y = getTerrainHeight(x, z) + 1.0; 

            group.position.set(x, y, z);
            group.userData = { type: type, initialY: y };
            group.rotation.x = 0.5; 
            
            scene.add(group);
            if (type === 'water') waterSwords.push(group);
            else fireSwords.push(group);
        }

        function updateSwords() {
            if (!player) return;
            
            const processList = (list, type) => {
                for (let i = list.length - 1; i >= 0; i--) {
                    const sword = list[i];
                    sword.rotation.y += 0.03;
                    sword.position.y = sword.userData.initialY + Math.sin(Date.now() * 0.005) * 0.5;

                    const dx = player.position.x - sword.position.x;
                    const dz = player.position.z - sword.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    
                    if (dist < 2.0) {
                        activatePowerUp(type);
                        scene.remove(sword);
                        list.splice(i, 1);
                        setTimeout(() => spawnSword(type), 30000); 
                    }
                }
            };

            processList(waterSwords, 'water');
            processList(fireSwords, 'fire');
        }

        function activatePowerUp(type) {
            AudioEngine.powerUp();
            const duration = config.powerUpDuration;
            
            if (type === 'water') {
                isWaterMode = true;
                isFireMode = false; 
                waterTimer = duration;
                
                flashOverlay('water-overlay');
                document.getElementById('water-status').style.display = 'block';
                document.getElementById('fire-status').style.display = 'none';
                
                showNotification("RANGE UP!", "#00ffff");
                setTimeout(() => showNotification("DEFENSE UP!", "#00ffff"), 300);

                if (playerParts.aura) {
                    playerParts.aura.material.color.setHex(0x00ffff);
                    playerParts.aura.visible = true;
                }
            } else {
                isFireMode = true;
                isWaterMode = false; 
                fireTimer = duration;
                
                flashOverlay('fire-overlay');
                document.getElementById('fire-status').style.display = 'block';
                document.getElementById('water-status').style.display = 'none';
                
                showNotification("DAMAGE UP!", "#ff4400");
                setTimeout(() => showNotification("LIFESTEAL!", "#ff0066"), 300);

                if (playerParts.aura) {
                    playerParts.aura.material.color.setHex(0xff4400);
                    playerParts.aura.visible = true;
                }
            }
        }

        function flashOverlay(id) {
            const el = document.getElementById(id);
            el.style.opacity = 0.5;
            setTimeout(() => el.style.opacity = 0, 500);
        }

        function updatePowerState() {
            if (smashCooldown > 0) {
                smashCooldown--;
                const btn = document.getElementById('btn-smash');
                const circle = document.getElementById('smash-timer-circle');
                
                if (btn && circle) {
                     btn.classList.remove('ready');
                     const total = config.smashCooldownTime;
                     const offset = 200 * (1 - (smashCooldown / total));
                     circle.style.strokeDashoffset = -offset; 
                }
            } else {
                const btn = document.getElementById('btn-smash');
                if (btn && !btn.classList.contains('ready')) {
                    btn.classList.add('ready');
                    const circle = document.getElementById('smash-timer-circle');
                    if(circle) circle.style.strokeDashoffset = 0; 
                }
            }

            if (isWaterMode) {
                waterTimer--;
                if (waterTimer <= 0) {
                    isWaterMode = false;
                    document.getElementById('water-status').style.display = 'none';
                }
            }
            if (isFireMode) {
                fireTimer--;
                if (fireTimer <= 0) {
                    isFireMode = false;
                    document.getElementById('fire-status').style.display = 'none';
                }
            }

            if (playerParts.aura) {
                if (isWaterMode || isFireMode) {
                    playerParts.aura.visible = true;
                    playerParts.aura.rotation.y += 0.05;
                    const scale = 1.0 + Math.sin(Date.now() * 0.01) * 0.1;
                    playerParts.aura.scale.setScalar(scale);
                    
                    if (isFireMode) playerParts.aura.material.color.setHex(0xff4400);
                    else if (isWaterMode) playerParts.aura.material.color.setHex(0x00ffff);
                } else {
                    playerParts.aura.visible = false;
                }
            }
        }

        // --- Visual Effects ---
        function createSlashEffect(type) {
            let color = 0xccffff; 
            if (isWaterMode) color = 0x00ffff;
            if (isFireMode) color = 0xff4400;

            const geometry = new THREE.RingGeometry(2.0, 3.5, 16, 1, 0, Math.PI); 
            const material = new THREE.MeshBasicMaterial({ 
                color: color, 
                side: THREE.DoubleSide, transparent: true, opacity: 0.8
            });
            const slash = new THREE.Mesh(geometry, material);
            const playerDir = new THREE.Vector3();
            player.getWorldDirection(playerDir);
            
            let baseScale = 1.0;
            baseScale = 1.0 * attackRangeMultiplier; 
            if (isWaterMode) baseScale *= 2.0; 
            
            slash.scale.set(baseScale, baseScale, baseScale);

            // COMBO VISUAL ANGLES
            // Type 0: Diagonal (Std)
            // Type 1: Horizontal (Right to Left)
            // Type 2: Vertical (Overhead)
            
            let angle = 0;
            let tilt = 0.2;
            
            if (type === 0) {
                angle = Math.PI / 3; // Diagonal
            } else if (type === 1) {
                angle = 0; // Horizontal flat
                tilt = 0;
            } else {
                angle = Math.PI / 2; // Vertical
                tilt = 0.5;
            }

            const forwardOffset = 1.5 + (baseScale * 0.5);
            slash.position.copy(player.position).add(playerDir.multiplyScalar(forwardOffset));
            slash.position.y += 1.5;
            slash.lookAt(player.position.x + playerDir.x * 5, player.position.y + 1.5, player.position.z + playerDir.z * 5);
            
            slash.rotation.z = angle; 
            slash.rotateX(tilt); 
            
            scene.add(slash);
            slashEffects.push({ mesh: slash, age: 0 });
        }

        function createSmashEffect(position, range, isRed = false) {
             const geometry = new THREE.CylinderGeometry(range, range, 5, 32, 1, true);
             const color = isRed ? 0xff0000 : 0xffff00;
             const material = new THREE.MeshBasicMaterial({
                 color: color,
                 transparent: true,
                 opacity: 0.6,
                 side: THREE.DoubleSide,
                 depthWrite: false,
                 blending: THREE.AdditiveBlending
             });
             const smashCyl = new THREE.Mesh(geometry, material);
             smashCyl.position.copy(position);
             smashCyl.position.y += 1; 
             scene.add(smashCyl);
             
             const ringGeo = new THREE.RingGeometry(1, range * 0.8, 32);
             const ringMat = new THREE.MeshBasicMaterial({ color: isRed ? 0xaa0000 : 0xffcc00, transparent:true, opacity: 0.8, side: THREE.DoubleSide });
             const ring = new THREE.Mesh(ringGeo, ringMat);
             ring.position.copy(position);
             ring.position.y += 0.2;
             ring.rotation.x = -Math.PI / 2;
             scene.add(ring);
             
             smashEffects.push({ mesh: smashCyl, ring: ring, age: 0, range: range });
        }

        function createChargeTelegraph(position, targetPos) {
            // Distance
            const dist = position.distanceTo(targetPos);
            const width = 2.0;
            const geo = new THREE.PlaneGeometry(width, dist);
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Position halfway between
            const mid = new THREE.Vector3().addVectors(position, targetPos).multiplyScalar(0.5);
            mesh.position.copy(mid);
            mesh.position.y = getTerrainHeight(mid.x, mid.z) + 0.2;
            mesh.rotation.x = -Math.PI / 2;
            
            // Orient
            mesh.lookAt(targetPos.x, mesh.position.y, targetPos.z);
            mesh.rotateX(-Math.PI / 2); // Correct plane orientation
            
            scene.add(mesh);
            return mesh;
        }

        function updateSlashEffects() {
            for (let i = slashEffects.length - 1; i >= 0; i--) {
                const eff = slashEffects[i];
                eff.age++;
                eff.mesh.material.opacity -= 0.1;
                eff.mesh.scale.multiplyScalar(1.05); 
                if (eff.age > 10) {
                    scene.remove(eff.mesh);
                    slashEffects.splice(i, 1);
                }
            }
            
            for (let i = smashEffects.length - 1; i >= 0; i--) {
                const eff = smashEffects[i];
                eff.age++;
                eff.mesh.scale.x += 0.05; eff.mesh.scale.z += 0.05;
                eff.mesh.material.opacity -= 0.04;
                
                eff.ring.scale.setScalar(1 + eff.age * 0.5);
                eff.ring.material.opacity -= 0.05;
                
                if (eff.age > 20) {
                    scene.remove(eff.mesh);
                    scene.remove(eff.ring);
                    smashEffects.splice(i, 1);
                }
            }
        }

        function createClawEffect(position, direction, isBoss, scale = 1.0) {
            const clawGroup = new THREE.Group();
            const length = isBoss ? 5.0 : 3.5;
            const width = isBoss ? 0.4 : 0.25;
            const slashGeo = new THREE.PlaneGeometry(width, length);
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 1.0 
            });
            for(let i=-1; i<=1; i++) {
                const scratch = new THREE.Mesh(slashGeo, mat);
                scratch.position.x = i * (isBoss ? 0.7 : 0.5);
                scratch.rotation.z = i * -0.2; 
                clawGroup.add(scratch);
            }
            clawGroup.scale.setScalar(scale);
            
            clawGroup.position.copy(position).add(new THREE.Vector3(0, 2, 0)); 
            const angle = Math.atan2(direction.x, direction.z);
            clawGroup.rotation.y = angle;
            clawGroup.rotation.x = Math.PI / 4; 
            scene.add(clawGroup);
            clawEffects.push({ mesh: clawGroup, age: 0 });
        }

        function updateClawEffects() {
            for (let i = clawEffects.length - 1; i >= 0; i--) {
                const eff = clawEffects[i];
                eff.age++;
                eff.mesh.translateY(-0.1);
                eff.mesh.children.forEach(c => c.material.opacity -= 0.03);
                if (eff.age > 40) {
                    scene.remove(eff.mesh);
                    clawEffects.splice(i, 1);
                }
            }
        }

        function healPlayer(amount) {
            if (playerHP >= config.maxHP) return; 
            playerHP = Math.min(playerHP + amount, config.maxHP);
            updateHealthBar();
            flashOverlay('heal-overlay');
        }

        function updateHealthBar() {
             const pct = (playerHP / config.maxHP) * 100;
             document.getElementById('health-bar').style.height = Math.max(0, pct) + '%';
        }

        function createBloodSplash(x, z) {
            const groundY = getTerrainHeight(x, z);
            const poolGeo = new THREE.CircleGeometry(0.1, 8); 
            const poolMat = new THREE.MeshBasicMaterial({ color: 0x8a0303, transparent: true, opacity: 0.8 });
            const pool = new THREE.Mesh(poolGeo, poolMat);
            pool.rotation.x = -Math.PI / 2;
            pool.position.set(x, groundY + 0.05, z); 
            scene.add(pool);

            const particles = [];
            const partGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const partMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
            for(let i=0; i<6; i++) { 
                const mesh = new THREE.Mesh(partGeo, partMat);
                mesh.position.set(x, groundY + 1.5, z); 
                const vx = (Math.random() - 0.5) * 0.4;
                const vy = Math.random() * 0.3 + 0.2; 
                const vz = (Math.random() - 0.5) * 0.4;
                scene.add(mesh);
                particles.push({ mesh, vel: new THREE.Vector3(vx, vy, vz) });
            }
            bloodSplashes.push({ pool, particles, age: 0 });
        }

        function updateBloodEffects() {
            for (let i = bloodSplashes.length - 1; i >= 0; i--) {
                const splash = bloodSplashes[i];
                splash.age += 1;
                if (splash.age < 20) {
                    const scale = 1 + (splash.age * 0.5); 
                    splash.pool.scale.setScalar(scale);
                } else if (splash.age > 150) {
                    splash.pool.material.opacity -= 0.02;
                }
                splash.particles.forEach(p => {
                    p.mesh.position.add(p.vel);
                    p.vel.y -= 0.02; 
                    const floorY = getTerrainHeight(p.mesh.position.x, p.mesh.position.z);
                    if (p.mesh.position.y < floorY + 0.1) {
                        p.mesh.position.y = floorY + 0.1;
                        p.vel.set(0, 0, 0); 
                    } else {
                        p.mesh.rotation.x += 0.1;
                    }
                });
                if (splash.age > 200) { 
                    scene.remove(splash.pool);
                    splash.particles.forEach(p => scene.remove(p.mesh));
                    bloodSplashes.splice(i, 1);
                }
            }
        }

        // --- Demon Enemy System ---
        function spawnDemon(isBoss, isSuperBoss) {
            const demonGroup = new THREE.Group();
            let scale = 1.0; let hp = 2; let points = 5; let skinColor = 0x666677;
            let eyeColor = 0xff0000; // Default Red Eyes

            const difficultyMultiplier = 1 + (score / 500);

            if (isSuperBoss) {
                // MEGA BOSS: Purple Skin, Spiked Club, Yellow Eyes
                scale = 3.5; hp = 8; points = 25; 
                skinColor = 0x330066; // Dark Purple
                eyeColor = 0xffff00;  // Yellow Eyes
            } else if (isBoss) {
                // REGULAR BOSS: Red Skin, Red Eyes
                scale = 2.5; hp = 5; points = 25; 
                skinColor = 0xcc0000; // Red
            }
            
            let baseDamage = 15;
            if (isBoss) baseDamage = 25; 
            if (isSuperBoss) baseDamage = 50; 

            const damage = Math.floor(baseDamage * difficultyMultiplier);
            
            const skinMat = new THREE.MeshToonMaterial({ color: skinColor, gradientMap: window.gradientMap });
            const eyeMat = new THREE.MeshToonMaterial({ color: eyeColor, emissive: eyeColor, emissiveIntensity: 0.5 }); 
            const pantsMat = new THREE.MeshToonMaterial({ color: 0x221100, gradientMap: window.gradientMap });
            const hornMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
            
            // Mega Boss Accessories
            const clubMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6 });
            const armorMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 });

            const bodyGeo = new THREE.CylinderGeometry(0.4, 0.3, 1.2, 6);
            const body = new THREE.Mesh(bodyGeo, skinMat); body.position.y = 1.6; demonGroup.add(body);

            // Shoulder Pads for Mega Boss
            if (isSuperBoss) {
                const padGeo = new THREE.SphereGeometry(0.3, 4, 4);
                const padL = new THREE.Mesh(padGeo, armorMat); padL.position.set(-0.6, 2.3, 0); demonGroup.add(padL);
                const padR = new THREE.Mesh(padGeo, armorMat); padR.position.set(0.6, 2.3, 0); demonGroup.add(padR);
            }

            const headGeo = new THREE.BoxGeometry(0.5, 0.6, 0.5);
            const head = new THREE.Mesh(headGeo, skinMat); head.position.y = 2.5; demonGroup.add(head);

            const hornGeo = new THREE.ConeGeometry(0.08, 0.4, 6);
            const hornL = new THREE.Mesh(hornGeo, hornMat); hornL.position.set(-0.2, 2.9, 0.1); hornL.rotation.z = 0.3; demonGroup.add(hornL);
            const hornR = new THREE.Mesh(hornGeo, hornMat); hornR.position.set(0.2, 2.9, 0.1); hornR.rotation.z = -0.3; demonGroup.add(hornR);

            const eyeGeo = new THREE.SphereGeometry(0.08, 4, 4);
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.15, 2.6, 0.25); demonGroup.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.15, 2.6, 0.25); demonGroup.add(eyeR);

            const armGeo = new THREE.BoxGeometry(0.15, 0.9, 0.15);
            const armL = new THREE.Mesh(armGeo, skinMat); armL.position.set(-0.5, 2.0, 0); armL.rotation.z = 0.2; demonGroup.add(armL);
            const armR = new THREE.Mesh(armGeo, skinMat); armR.position.set(0.5, 2.0, 0); armR.rotation.z = -0.2; demonGroup.add(armR);
            
            // Giant Club for Mega Boss
            if (isSuperBoss) {
                const clubHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.2), clubMat);
                clubHandle.position.y = -0.6;
                armR.add(clubHandle);
                
                const clubHead = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.1, 0.8, 8), clubMat);
                clubHead.position.y = -1.2;
                armR.add(clubHead);
                
                // Spikes
                const spikeGeo = new THREE.ConeGeometry(0.05, 0.2, 4);
                for(let i=0; i<8; i++) {
                    const s = new THREE.Mesh(spikeGeo, hornMat);
                    s.position.y = -1.0 - (Math.random()*0.4);
                    s.rotation.x = Math.random() * Math.PI;
                    s.rotation.z = Math.random() * Math.PI;
                    armR.add(s);
                }
            }

            const legGeo = new THREE.CylinderGeometry(0.15, 0.12, 1.0, 4);
            const legL = new THREE.Mesh(legGeo, pantsMat); legL.position.set(-0.2, 0.5, 0); demonGroup.add(legL);
            const legR = new THREE.Mesh(legGeo, pantsMat); legR.position.set(0.2, 0.5, 0); demonGroup.add(legR);

            demonGroup.scale.set(scale, scale, scale);

            const angle = Math.random() * Math.PI * 2;
            const dist = 50 + Math.random() * 90;
            demonGroup.position.set(Math.sin(angle)*dist, 0, Math.cos(angle)*dist);
            
            const spawnY = getTerrainHeight(demonGroup.position.x, demonGroup.position.z);
            demonGroup.position.y = spawnY;

            demonGroup.traverse((obj) => { if(obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; } });
            scene.add(demonGroup);
            
            const baseSpeed = 0.03 + Math.random() * 0.02;
            const scaledSpeed = baseSpeed * (1 + (difficultyMultiplier - 1) * 0.5);

            let bossAttackRange = 1.0;
            if(isBoss) bossAttackRange = 1.5; 
            if(isSuperBoss) bossAttackRange = 15.0; // Trigger range for special attack
            
            // Mega Boss moves faster (no penalty, slight boost)
            const speedMult = isSuperBoss ? 1.3 : (isBoss ? 0.7 : 1.0);

            enemies.push({
                mesh: demonGroup,
                speed: scaledSpeed * speedMult, 
                points: points, damage: damage, hp: hp, maxHp: hp,
                isBoss: isBoss || isSuperBoss, isSuperBoss: isSuperBoss,
                isRedBoss: (isBoss && !isSuperBoss),
                attackRange: bossAttackRange,
                attackCooldown: 0, hitCooldown: 0, alive: true, dying: 0,
                // Store limbs for animation
                parts: { armL, armR, legL, legR },
                // Special Boss States
                isCharging: false,
                chargeTimer: 0,
                telegraphMesh: null,
                targetPos: null,
                // Red Boss State
                chargeState: 0, // 0: Normal, 1: Prep, 2: Dashing
                chargeDir: new THREE.Vector3()
            });
        }

        function respawnEnemy() {
            if(isGameOver) return;
            const isBoss = Math.random() < 0.1;
            spawnDemon(isBoss, false);
        }

        function takeDamage(amount) {
            if (isWaterMode) amount *= 0.7; 
            playerHP -= amount;
            AudioEngine.damage();
            flashOverlay('damage-overlay');
            updateHealthBar();
            if (playerHP <= 0 && !isGameOver) gameOver();
        }

        function gameOver() {
            isGameOver = true;
            AudioEngine.isMuted = true; // Stop music
            document.getElementById('final-score').innerText = "Final Score: " + score;
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
            
            // Auto-save score if name exists
            if (playerName) {
                saveScoreToFirebase(playerName, score);
            } else {
                document.getElementById('score-submit-status').innerText = "Name not set - Score not saved";
            }
        }

        function updateEnemies() {
            if (!player || isGameOver) return;
            const scalingFactor = Math.floor(score / 100);
            maxEnemyCount = baseEnemyCount * Math.pow(2, scalingFactor);
            if (maxEnemyCount > 60) maxEnemyCount = 60;

            if (score >= nextBossScore) {
                spawnDemon(false, true); 
                nextBossScore += 100;
            }

            if (enemies.length < maxEnemyCount) {
                if (Math.random() < 0.05) respawnEnemy();
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (enemy.attackCooldown > 0) enemy.attackCooldown--;
                if (enemy.hitCooldown > 0) enemy.hitCooldown--;

                if (!enemy.alive) {
                    // Death animation logic
                    enemy.dying += 0.1;
                    enemy.mesh.scale.multiplyScalar(0.9);
                    enemy.mesh.rotation.x += 0.2;
                    enemy.mesh.position.y -= 0.1;
                    
                    if (enemy.telegraphMesh) {
                        scene.remove(enemy.telegraphMesh);
                        enemy.telegraphMesh = null;
                    }

                    if(enemy.mesh.scale.x < 0.1) {
                        if (enemy.isSuperBoss) {
                            healPlayer(config.maxHP); // FULL HEAL
                            attackRangeMultiplier += 0.05; 
                            showNotification("RANGE +5%", "#ffff00");
                            rankUp();
                        }
                        if (isFireMode) healPlayer(4); 

                        scene.remove(enemy.mesh);
                        enemies.splice(i, 1);
                    }
                    continue;
                }

                // --- RED BOSS CHARGE LOGIC START ---
                if (enemy.isRedBoss) {
                    // State 1: Prep (Telegraph)
                    if (enemy.chargeState === 1) {
                        enemy.chargeTimer++;
                        
                        // FIX: Face the LOCKED target position, NOT the moving player
                        // This prevents the "aim-bot" behavior
                        enemy.mesh.lookAt(enemy.targetPos.x, enemy.mesh.position.y, enemy.targetPos.z);
                        
                        if (enemy.chargeTimer > 60) { // 1 second prep
                            // Transition to Dash
                            enemy.chargeState = 2;
                            enemy.chargeTimer = 0;
                            AudioEngine.bossDash();
                            
                            // Remove line
                            if(enemy.telegraphMesh) {
                                scene.remove(enemy.telegraphMesh);
                                enemy.telegraphMesh = null;
                            }
                            
                            // Calculate Dash Vector based on LOCKED TARGET
                            enemy.chargeDir.subVectors(enemy.targetPos, enemy.mesh.position).normalize();
                            
                            // Anime tilt forward for dash
                            enemy.mesh.children.forEach(c => {
                                if(c.geometry.type === 'CylinderGeometry' && c.position.y > 1.0) { // Body parts roughly
                                     c.rotation.x = 0.5; // Lean forward
                                }
                            });
                        }
                        continue; // Skip normal movement
                    }
                    // State 2: Dashing
                    else if (enemy.chargeState === 2) {
                         enemy.chargeTimer++;
                         
                         // Move fast
                         enemy.mesh.position.addScaledVector(enemy.chargeDir, 0.8); // Fast dash speed
                         enemy.mesh.position.y = calculateTerrainHeight(enemy.mesh.position.x, enemy.mesh.position.z);
                         
                         // Hitbox check
                         const dToP = enemy.mesh.position.distanceTo(player.position);
                         if (dToP < 2.5) {
                             takeDamage(enemy.damage);
                             
                             // Knockback player
                             const pushDir = enemy.chargeDir.clone();
                             player.position.addScaledVector(pushDir, 5.0);
                             
                             // End Dash
                             enemy.chargeState = 0;
                             enemy.attackCooldown = 120; // 2 sec cooldown
                         }
                         
                         // End condition (Time or Hit Wall)
                         if (enemy.chargeTimer > 30 || Math.abs(enemy.mesh.position.x) > config.mapLimit || Math.abs(enemy.mesh.position.z) > config.mapLimit) {
                             enemy.chargeState = 0;
                             enemy.attackCooldown = 120;
                             // Reset tilt
                             enemy.mesh.children.forEach(c => {
                                if(c.rotation.x === 0.5) c.rotation.x = 0;
                            });
                         }
                         continue; // Skip normal movement
                    }
                }
                // --- RED BOSS CHARGE LOGIC END ---

                // --- MEGA BOSS BEHAVIOR START ---
                if (enemy.isSuperBoss) {
                    if (enemy.isCharging) {
                        enemy.chargeTimer++;
                        
                        // Raise arms animation
                        enemy.parts.armR.rotation.z = Math.PI - 0.5; // Arm up
                        enemy.parts.armL.rotation.z = -(Math.PI - 0.5); 

                        // Update visual indicator (Red Circle)
                        if (enemy.telegraphMesh) {
                            // Pulse effect
                            const pulse = 1 + Math.sin(enemy.chargeTimer * 0.2) * 0.1;
                            enemy.telegraphMesh.scale.set(pulse, 1, pulse);
                            enemy.telegraphMesh.material.opacity = 0.5 + Math.sin(enemy.chargeTimer * 0.5) * 0.3;
                        }

                        // Attack Trigger
                        if (enemy.chargeTimer > 90) { // 1.5 seconds delay (60fps approx)
                            // 1. Visual & Audio Impact
                            // BUFF: Increased visual size to 7.0
                            createSmashEffect(enemy.targetPos, 7.0, true); 
                            AudioEngine.bossSmash();
                            
                            // 2. Cleanup Telegraph
                            if(enemy.telegraphMesh) {
                                scene.remove(enemy.telegraphMesh);
                                enemy.telegraphMesh = null;
                            }

                            // 3. Damage Check
                            const distToTarget = player.position.distanceTo(enemy.targetPos);
                            // BUFF: Increased danger zone radius to 7.0
                            if (distToTarget < 7.0) {
                                takeDamage(enemy.damage);
                            }

                            // 4. Reset
                            enemy.isCharging = false;
                            enemy.attackCooldown = 180; // 3 seconds cooldown
                            enemy.parts.armR.rotation.z = -0.2; // Reset arm
                            enemy.parts.armL.rotation.z = 0.2;
                        }
                        
                        // Boss looks at target while charging but doesn't move
                        enemy.mesh.lookAt(enemy.targetPos.x, enemy.mesh.position.y, enemy.targetPos.z);
                        continue; // Skip normal movement logic
                    }
                }
                // --- MEGA BOSS BEHAVIOR END ---

                const dx = player.position.x - enemy.mesh.position.x;
                const dz = player.position.z - enemy.mesh.position.z;
                const dist = Math.sqrt(dx*dx + dz*dz); 
                
                const collisionThreshold = enemy.mesh.scale.x * 1.5; 

                // Movement Logic
                if (dist > collisionThreshold) {
                    enemy.mesh.lookAt(player.position.x, enemy.mesh.position.y, player.position.z);
                    enemy.mesh.translateZ(enemy.speed);
                    enemy.mesh.position.y = calculateTerrainHeight(enemy.mesh.position.x, enemy.mesh.position.z) - 0.2;
                    
                    // Walking Animation
                    if (enemy.parts) {
                        const walkSpeed = enemy.isSuperBoss ? 0.3 : 0.15;
                        const walkTime = Date.now() * 0.015;
                        enemy.parts.legL.rotation.x = Math.sin(walkTime) * 0.5;
                        enemy.parts.legR.rotation.x = Math.sin(walkTime + Math.PI) * 0.5;
                        enemy.parts.armL.rotation.x = Math.sin(walkTime + Math.PI) * 0.5;
                        enemy.parts.armR.rotation.x = Math.sin(walkTime) * 0.5;
                    }
                }

                const attackDist = collisionThreshold + enemy.attackRange;

                // Attack Logic
                if (dist < attackDist && enemy.attackCooldown <= 0) {
                    if (enemy.isSuperBoss) {
                        // START CHARGE SEQUENCE
                        enemy.isCharging = true;
                        enemy.chargeTimer = 0;
                        enemy.targetPos = player.position.clone();
                        enemy.targetPos.y = calculateTerrainHeight(enemy.targetPos.x, enemy.targetPos.z) + 0.1;
                        
                        AudioEngine.bossCharge(); // Warning sound
                        
                        // Create Telegraph Circle
                        const teleGeo = new THREE.RingGeometry(3.5, 3.8, 32);
                        const teleMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
                        enemy.telegraphMesh = new THREE.Mesh(teleGeo, teleMat);
                        enemy.telegraphMesh.rotation.x = -Math.PI / 2;
                        enemy.telegraphMesh.position.copy(enemy.targetPos);
                        scene.add(enemy.telegraphMesh);
                        
                    } else {
                        // Normal Enemy Attack
                        takeDamage(enemy.damage);
                        enemy.attackCooldown = 60; 
                        const dir = new THREE.Vector3(dx, 0, dz).normalize();
                        createClawEffect(enemy.mesh.position, dir, enemy.isBoss, enemy.attackRange);
                    }
                }
                
                // Red Boss Trigger Logic (Medium range)
                if (enemy.isRedBoss && enemy.chargeState === 0 && enemy.attackCooldown <= 0) {
                     if (dist < 20 && dist > 8 && Math.random() < 0.02) {
                         enemy.chargeState = 1;
                         enemy.chargeTimer = 0;
                         AudioEngine.bossCharge(); // Reuse charge sound
                         
                         // FIX: Lock the target position NOW
                         enemy.targetPos = player.position.clone();
                         enemy.targetPos.y = getTerrainHeight(enemy.targetPos.x, enemy.targetPos.z);
                         
                         enemy.telegraphMesh = createChargeTelegraph(enemy.mesh.position, enemy.targetPos);
                     }
                }

                let baseRange = 5.0 * attackRangeMultiplier;
                if (isWaterMode) baseRange *= 2.0; 
                
                const hitRange = baseRange + (enemy.mesh.scale.x - 1); 

                if (isAttacking && dist < hitRange && enemy.hitCooldown <= 0) { 
                    const playerDir = new THREE.Vector3();
                    player.getWorldDirection(playerDir);
                    const dirToEnemy = new THREE.Vector3(-dx, 0, -dz).normalize();
                    const angle = playerDir.angleTo(dirToEnemy);

                    if (angle < 1.2 && attackProgress > 0.1 && attackProgress < 0.9) {
                        const dmg = isFireMode ? 2 : 1;
                        enemy.hp -= dmg;
                        enemy.hitCooldown = 15; 
                        
                        // Hit Sound
                        AudioEngine.slashHit();

                        const knockbackStr = 1.0;
                        enemy.mesh.position.add(dirToEnemy.multiplyScalar(knockbackStr));
                        
                        enemy.mesh.traverse((child) => {
                            if (child.isMesh) {
                                if(child.material && child.material.emissive) {
                                    const oldEmissive = child.material.emissive.getHex(); 
                                    child.material.emissive.setHex(0xff0000);
                                    child.material.emissiveIntensity = 0.8;
                                    setTimeout(() => {
                                        if(child.material) {
                                            child.material.emissive.setHex(oldEmissive);
                                            child.material.emissiveIntensity = 0.0;
                                        }
                                    }, 100);
                                }
                            }
                        });

                        createBloodSplash(enemy.mesh.position.x, enemy.mesh.position.z);
                        if (enemy.hp <= 0) {
                            enemy.alive = false;
                            score += enemy.points;
                            const scoreEl = document.getElementById('score-board');
                            scoreEl.innerText = score;
                            scoreEl.style.transform = "scale(1.2)";
                            setTimeout(() => scoreEl.style.transform = "scale(1.0)", 100);
                        }
                    }
                }
            }
        }

        function triggerAttack() {
            if (isAttacking || isGameOver || isSmashing || !isGameStarted) return;
            
            // --- NEW: AUTO-AIM ASSIST ---
            let nearestEnemy = null;
            let minDist = 10.0; // Auto-aim range
            
            for(let enemy of enemies) {
                if(!enemy.alive) continue;
                const d = player.position.distanceTo(enemy.mesh.position);
                if (d < minDist) {
                    minDist = d;
                    nearestEnemy = enemy;
                }
            }
            
            // If enemy found nearby, snap face to them
            if (nearestEnemy) {
                player.lookAt(nearestEnemy.mesh.position.x, player.position.y, nearestEnemy.mesh.position.z);
            }
            // ---------------------------

            // --- NEW: COMBO LOGIC ---
            const now = Date.now();
            if (now - lastAttackTime < 900) {
                comboStep = (comboStep + 1) % 3; // Cycle 0, 1, 2
            } else {
                comboStep = 0; // Reset
            }
            lastAttackTime = now;
            // ------------------------

            isAttacking = true; attackProgress = 0;
            
            createSlashEffect(comboStep);
            AudioEngine.slashMiss(); 
            
            if(playerParts.armR) { 
                playerParts.armR.rotation.y = -0.5;
            }
        }
        
        function triggerSmash() {
            if (isAttacking || isGameOver || isSmashing || smashCooldown > 0 || !isGameStarted) return;
            
            isSmashing = true;
            smashCooldown = config.smashCooldownTime;
            
            AudioEngine.jump(); // Play Jump sound
            
            playerVelocity.y = config.smashJumpForce;
            playerOnGround = false;
        }
        
        function performSmashImpact() {
             flashOverlay('smash-overlay');
             AudioEngine.smashImpact(); // Play Smash sound
             
             const range = 10.0; 
             const damage = isFireMode ? 9 : 3; 
             
             createSmashEffect(player.position, range);
             
             for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (!enemy.alive) continue;
                
                const dist = player.position.distanceTo(enemy.mesh.position);
                
                if (dist < range) {
                    enemy.hp -= 3; 
                    enemy.hitCooldown = 30;
                    
                    const dir = new THREE.Vector3().subVectors(enemy.mesh.position, player.position).normalize();
                    enemy.mesh.position.add(dir.multiplyScalar(4.0));
                    
                     enemy.mesh.traverse((child) => {
                        if (child.isMesh && child.material && child.material.emissive) {
                            child.material.emissive.setHex(0xff0000);
                            setTimeout(() => { if(child.material) child.material.emissive.setHex(0); }, 200);
                        }
                    });
                    
                    createBloodSplash(enemy.mesh.position.x, enemy.mesh.position.z);
                    
                    if (enemy.hp <= 0) {
                        enemy.alive = false;
                        score += enemy.points;
                        document.getElementById('score-board').innerText = score;
                    }
                }
             }
        }

        function updatePlayer() {
            if (!player || isGameOver) return;
            updatePowerState();

            let moveMult = isWaterMode ? 1.1 : 1.0;
            const speed = (keyState['ShiftLeft'] ? config.runSpeed : config.moveSpeed) * moveMult;
            let moveForward = 0; let moveRight = 0;
            
            if (!isSmashing && isGameStarted) {
                if (keyState['KeyW'] || keyState['ArrowUp']) moveForward += 1;
                if (keyState['KeyS'] || keyState['ArrowDown']) moveForward -= 1;
                if (keyState['KeyD'] || keyState['ArrowRight']) moveRight -= 1;
                if (keyState['KeyA'] || keyState['ArrowLeft']) moveRight += 1;
                if (keyState['KeyF']) triggerAttack();
            }

            const angle = cameraAngle;
            const dx = Math.sin(angle) * moveForward + Math.cos(angle) * moveRight;
            const dz = Math.cos(angle) * moveForward - Math.sin(angle) * moveRight;
            const isMoving = (moveForward !== 0 || moveRight !== 0);

            if (isMoving && !isSmashing && !isAttacking) { // Disable movement rotation during attack for Auto-Aim to work
                const nextX = player.position.x - dx * speed;
                const nextZ = player.position.z - dz * speed;
                
                let canMove = true;
                const playerRadius = 1.0; 
                
                for(let enemy of enemies) {
                    if (!enemy.alive) continue;
                    const enemyRadius = enemy.mesh.scale.x * 0.5;
                    const collisionDist = playerRadius + enemyRadius;
                    
                    const distToNext = Math.sqrt((nextX - enemy.mesh.position.x)**2 + (nextZ - enemy.mesh.position.z)**2);
                    
                    if (distToNext < collisionDist) {
                        canMove = false; 
                        break;
                    }
                }
                
                if (canMove) {
                    if (Math.abs(nextX) < config.mapLimit) player.position.x = nextX;
                    if (Math.abs(nextZ) < config.mapLimit) player.position.z = nextZ;
                }
                
                const targetRotation = Math.atan2(dx, dz) + Math.PI;
                let rotDiff = targetRotation - player.rotation.y;
                while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
                while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
                player.rotation.y += rotDiff * 0.2; 
                
                // --- NEW: FORWARD LEAN ---
                // Smoothly tilt forward when running (approx 15 degrees / 0.25 rad)
                player.rotation.x = THREE.MathUtils.lerp(player.rotation.x, 0.25, 0.1);

                animTime += 0.2;
                if(playerParts.legL && playerParts.legR) {
                    playerParts.legL.rotation.x = Math.sin(animTime) * 0.8; 
                    playerParts.legR.rotation.x = Math.sin(animTime + Math.PI) * 0.8;
                    if (!isAttacking) {
                        playerParts.armL.rotation.x = Math.sin(animTime + Math.PI) * 0.6;
                        playerParts.armR.rotation.x = Math.sin(animTime) * 0.6;
                        playerParts.armL.rotation.z = -0.4; playerParts.armR.rotation.z = 0.4; 
                    }
                    playerParts.hairBack.rotation.x = 0.2 + Math.sin(animTime * 2) * 0.1; 
                    playerParts.hairBack.rotation.z = Math.sin(animTime) * 0.1; 
                }
            } else if (!isSmashing) {
                // --- NEW: RETURN TO UPRIGHT ---
                player.rotation.x = THREE.MathUtils.lerp(player.rotation.x, 0, 0.1);
                
                if(playerParts.legL) {
                    playerParts.legL.rotation.x = THREE.MathUtils.lerp(playerParts.legL.rotation.x, 0, 0.1);
                    playerParts.legR.rotation.x = THREE.MathUtils.lerp(playerParts.legR.rotation.x, 0, 0.1);
                    playerParts.armL.rotation.x = THREE.MathUtils.lerp(playerParts.armL.rotation.x, 0, 0.1);
                    playerParts.armL.rotation.z = THREE.MathUtils.lerp(playerParts.armL.rotation.z, -0.4, 0.1);
                    if (!isAttacking) {
                        playerParts.armR.rotation.x = THREE.MathUtils.lerp(playerParts.armR.rotation.x, 0, 0.1);
                        playerParts.armR.rotation.z = THREE.MathUtils.lerp(playerParts.armR.rotation.z, 0.4, 0.1);
                    }
                    playerParts.hairBack.rotation.z = Math.sin(Date.now() * 0.001) * 0.05;
                    playerParts.hairBack.rotation.x = THREE.MathUtils.lerp(playerParts.hairBack.rotation.x, 0, 0.1);
                }
            }

            if (isAttacking && playerParts.armR && !isSmashing) {
                attackProgress += 0.1; 
                
                // --- NEW: COMBO ANIMATION VARIATIONS ---
                let startX, startZ, endX, endZ;
                
                if (comboStep === 0) { 
                    // Hit 1: Diagonal Slash
                    startX = -2.5; startZ = -1.0; 
                    endX = 1.0; endZ = 1.0;
                } else if (comboStep === 1) {
                    // Hit 2: Horizontal Backhand
                    startX = -1.5; startZ = 1.5; 
                    endX = -1.5; endZ = -1.5;
                } else {
                    // Hit 3: Vertical Chop
                    startX = -3.0; startZ = 0; 
                    endX = 1.5; endZ = 0;
                }

                if (attackProgress < 0.3) {
                    playerParts.armR.rotation.x = THREE.MathUtils.lerp(playerParts.armR.rotation.x, startX, 0.3);
                    playerParts.armR.rotation.z = THREE.MathUtils.lerp(playerParts.armR.rotation.z, startZ, 0.3);
                } else if (attackProgress < 0.6) {
                    playerParts.armR.rotation.x = THREE.MathUtils.lerp(playerParts.armR.rotation.x, endX, 0.5);
                    playerParts.armR.rotation.z = THREE.MathUtils.lerp(playerParts.armR.rotation.z, endZ, 0.5);
                    playerParts.hairBack.rotation.x = -0.5; 
                } else {
                    playerParts.armR.rotation.x = THREE.MathUtils.lerp(playerParts.armR.rotation.x, 0, 0.1);
                    playerParts.armR.rotation.z = THREE.MathUtils.lerp(playerParts.armR.rotation.z, 0.4, 0.1);
                    playerParts.armR.rotation.y = 0;
                }
                // ---------------------------------------

                if (attackProgress >= 1) isAttacking = false;
            }

            const groundHeight = getTerrainHeight(player.position.x, player.position.z);
            
            if (isSmashing) {
                if (!playerOnGround) {
                     player.rotation.y += 0.5; 
                     if(playerParts.armR) {
                         playerParts.armR.rotation.x = -3.0; 
                         playerParts.armL.rotation.x = -3.0;
                     }
                }
            }
            
            if ((keyState['Space']) && playerOnGround && !isSmashing && isGameStarted) { 
                AudioEngine.jump();
                playerVelocity.y = config.jumpForce; 
                playerOnGround = false; 
            }
            
            playerVelocity.y -= config.gravity;
            player.position.y += playerVelocity.y;
            
            if (player.position.y <= groundHeight) { 
                player.position.y = groundHeight; 
                playerVelocity.y = 0; 
                
                if (isSmashing && !playerOnGround) {
                     performSmashImpact();
                     isSmashing = false;
                     if(playerParts.armR) {
                         playerParts.armR.rotation.x = 0;
                         playerParts.armL.rotation.x = 0;
                     }
                }
                
                playerOnGround = true; 
            }
        }

        function updateCamera() {
            if (!player) return;
            const dist = 12; const height = 6 + (cameraVertical * 5); 
            const targetX = player.position.x + Math.sin(cameraAngle) * dist;
            const targetZ = player.position.z + Math.cos(cameraAngle) * dist;
            let targetY = player.position.y + height;
            const camGround = getTerrainHeight(targetX, targetZ);
            if (targetY < camGround + 1.0) targetY = camGround + 1.0;
            camera.position.lerp(new THREE.Vector3(targetX, targetY, targetZ), 0.1);
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);
        }

        function onMouseMove(event) {
            const sensitivity = 0.005;
            cameraAngle -= event.movementX * sensitivity;
            cameraVertical += event.movementY * sensitivity;
            cameraVertical = Math.max(-0.5, Math.min(1.5, cameraVertical));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePlayer(); updateEnemies(); updateApples(); updateBloodEffects();
            updateSwords(); updateSlashEffects(); updateClawEffects();
            updateFireworks(); 
            updateCamera();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
