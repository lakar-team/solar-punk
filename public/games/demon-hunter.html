<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Demon Hunter - Combo Update v5.0</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050520; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; display: block; cursor: default; }
        
        /* --- NEW BOTTOM BAR UI --- */
        #ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(0, 10, 0, 0.85);
            border-top: 1px solid #4a6a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 100;
            user-select: none;
        }

        #ui-left-group, #ui-right-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 { 
            margin: 0; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #aaccaa; 
            white-space: nowrap;
        }

        #controls-hint-toggle {
            background: #2a4a2a;
            color: #ccffcc;
            border: 1px solid #4a6a4a;
            border-radius: 4px;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #controls-popup {
            position: absolute;
            bottom: 50px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #4a6a4a;
            padding: 10px;
            border-radius: 5px;
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }
        #controls-popup p { margin: 0; font-size: 0.8rem; color: #aaccaa; }
        .key { display: inline-block; background: #2a4a2a; padding: 1px 4px; border-radius: 3px; font-family: monospace; color: white; }

        #rank-display { color: #ffff00; font-size: 0.9rem; font-weight: bold; border: none; margin: 0; padding: 0; }
        
        .status-label {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            display: none;
            text-shadow: 0 0 5px currentColor;
        }
        #water-status { color: #00ffff; }
        #fire-status { color: #ff4400; }
        /* ------------------------- */

        #score-board {
            position: absolute;
            top: 20px;
            right: 60px; 
            color: #ffcc00;
            pointer-events: none;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #ffaa00;
            font-family: 'Courier New', Courier, monospace;
        }

        #health-container {
            position: absolute;
            right: 20px;
            top: 80px; 
            width: 15px;
            height: 150px;
            background: #330000;
            border: 2px solid #555;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse; 
        }
        
        #health-bar {
            width: 100%;
            height: 100%; 
            background: linear-gradient(to top, #ff0000, #ff4444);
            transition: height 0.2s;
        }

        #health-text {
            position: absolute;
            right: 40px;
            top: 150px;
            transform: rotate(-90deg);
            transform-origin: right top;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            white-space: nowrap;
        }

        #notification-area {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .pop-msg {
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            animation: floatUp 2s forwards;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            10% { opacity: 1; transform: translateY(0) scale(1.2); }
            20% { opacity: 1; transform: translateY(0) scale(1.0); }
            80% { opacity: 1; transform: translateY(-50px); }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        #damage-overlay, #heal-overlay, #water-overlay, #fire-overlay, #lifesteal-overlay, #smash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }
        #damage-overlay { background: red; transition: opacity 0.1s; }
        #heal-overlay { background: #00ff00; }
        #water-overlay { background: cyan; }
        #fire-overlay { background: #ff4400; }
        #lifesteal-overlay { background: #ff0066; opacity: 0; }
        #smash-overlay { background: #ffffaa; opacity: 0; transition: opacity 0.1s; }

        #game-over-screen, #start-screen, #leaderboard-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3333;
            z-index: 20;
        }
        #start-screen { display: flex; color: #ccffcc; background: rgba(0, 10, 0, 0.95); }
        #leaderboard-screen { z-index: 30; background: rgba(0, 10, 20, 0.98); }
        
        #game-over-screen h1, #start-screen h1, #leaderboard-screen h1 { font-size: 4rem; margin: 0; text-shadow: 0 0 20px red; }
        #start-screen h1 { text-shadow: 0 0 20px #00ff00; color: #ccffcc; }
        #leaderboard-screen h1 { text-shadow: 0 0 20px #00ffff; color: #ccffff; font-size: 3rem; margin-bottom: 20px; }
        
        #final-score { font-size: 2rem; color: white; margin-top: 10px; }
        
        .menu-btn {
            margin-top: 15px; padding: 15px 40px; font-size: 1.5rem;
            background: #440000; color: white; border: 1px solid red;
            cursor: pointer; border-radius: 5px; transition: 0.2s;
            text-transform: uppercase;
        }
        .menu-btn:hover { background: #660000; scale: 1.1; }
        
        #start-btn { background: #004400; border: 1px solid #00ff00; }
        #start-btn:hover { background: #006600; }

        #leaderboard-btn, #leaderboard-btn-gameover {
            background: #002244; border: 1px solid #00ffff; font-size: 1rem; padding: 10px 20px; margin-top: 10px;
        }
        #leaderboard-btn:hover, #leaderboard-btn-gameover:hover { background: #004466; }

        /* INPUT FIELD FOR NAME */
        #player-name-input {
            margin-top: 20px;
            padding: 10px;
            font-size: 1.5rem;
            text-align: center;
            background: rgba(0,0,0,0.5);
            border: 2px solid #4a6a4a;
            color: #ccffcc;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
            width: 200px;
        }
        #player-name-input:focus { outline: none; border-color: #00ff00; }

        /* LEADERBOARD TABLE */
        #leaderboard-table {
            width: 80%;
            max-width: 500px;
            border-collapse: collapse;
            color: #ccffff;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 20px;
        }
        #leaderboard-table th { border-bottom: 2px solid #00ffff; padding: 10px; text-align: left; }
        #leaderboard-table td { border-bottom: 1px solid #004444; padding: 8px; }
        #leaderboard-table tr:nth-child(even) { background: rgba(0, 255, 255, 0.05); }
        .rank-col { width: 50px; text-align: center; color: #ffff00; font-weight: bold; }
        .score-col { text-align: right; color: #ffcc00; }

        #loading {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: #ccffcc; font-size: 24px; font-family: serif;
        }

        /* --- UPDATED MOBILE CONTROLS --- */
        #mobile-controls {
            position: absolute; 
            bottom: 50px; /* Moved up to clear bottom bar */
            left: 0; width: 100%; height: 180px;
            z-index: 10; display: flex; justify-content: space-between;
            pointer-events: none; user-select: none;
        }
        .control-zone { pointer-events: auto; position: relative; cursor: pointer; }
        #joystick-area { width: 180px; height: 180px; margin-left: 20px; }
        #joystick-base {
            width: 140px; height: 140px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            position: absolute; bottom: 20px; left: 20px;
        }
        #joystick-stick {
            width: 60px; height: 60px; background: rgba(0, 255, 0, 0.5);
            border-radius: 50%; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        #action-area {
            width: 300px; height: 100px; margin-right: 20px;
            position: absolute; bottom: 20px; right: 20px;
            display: flex; align-items: center; justify-content: flex-end;
            gap: 15px; 
        }
        .mob-btn {
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white; font-weight: bold; font-size: 1.0rem;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; /* Allow key label stacking */
            touch-action: manipulation;
            position: relative;
            background-color: rgba(0,0,0,0.2);
        }
        /* Keyboard hints */
        .kb-hint {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: -2px;
            font-family: monospace;
        }

        #btn-jump { background: rgba(0, 0, 255, 0.3); }
        #btn-attack { background: rgba(255, 0, 0, 0.3); width: 80px; height: 80px; font-size: 1.2rem; }
        
        #btn-smash { 
            background: rgba(100, 100, 100, 0.5); 
            font-size: 0.8rem;
            transition: background 0.3s;
        }
        #btn-smash.ready {
            background: rgba(255, 200, 0, 0.5);
            border-color: #ffaa00;
            box-shadow: 0 0 10px #ffaa00;
        }
        
        .timer-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
        }
        .timer-circle {
            fill: none;
            stroke: #ffff00;
            stroke-width: 4;
            stroke-dasharray: 200; 
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
        }

        .mob-btn:active { opacity: 0.8; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="loading">Summoning Horde...</div>
    <div id="damage-overlay"></div>
    <div id="heal-overlay"></div>
    <div id="water-overlay"></div>
    <div id="fire-overlay"></div>
    <div id="lifesteal-overlay"></div>
    <div id="smash-overlay"></div>
    
    <div id="notification-area"></div>

    <div id="controls-popup">
        <p>Move: <span class="key">WASD</span></p>
        <p>Jump: <span class="key">SPACE</span></p>
        <p>Slash: <span class="key">L-CLICK</span> / <span class="key">F</span></p>
        <p>Smash: <span class="key">R-CLICK</span> / <span class="key">E</span></p>
    </div>

    <div id="ui-layer">
        <div id="ui-left-group">
            <h1>Demon Hunter v5.0</h1>
            <div id="controls-hint-toggle" onclick="toggleControls()">?</div>
        </div>
        
        <div id="ui-right-group">
            <div id="rank-display">LVL: 1</div>
            <div id="water-status" class="status-label">WATER</div>
            <div id="fire-status" class="status-label">FIRE</div>
        </div>
    </div>

    <div id="score-board">0</div>
    <div id="health-text">HP</div>
    <div id="health-container">
        <div id="health-bar"></div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-area" class="control-zone">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
        </div>
        <div id="action-area" class="control-zone">
            <div id="btn-smash" class="mob-btn">
                SMASH
                <span class="kb-hint">E/R-CLK</span>
                <svg class="timer-svg" viewBox="0 0 70 70">
                    <circle class="timer-circle" cx="35" cy="35" r="32" id="smash-timer-circle" />
                </svg>
            </div>
            <div id="btn-jump" class="mob-btn">
                JUMP
                <span class="kb-hint">SPC</span>
            </div>
            <div id="btn-attack" class="mob-btn">
                ATK
                <span class="kb-hint">F/CLK</span>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <h1>DEMON HUNTER</h1>
        <div style="margin-bottom: 10px; font-size: 1.0rem; color: #aaccaa;">Headphones Recommended</div>
        
        <input type="text" id="player-name-input" placeholder="NAME (MAX 7)" maxlength="7">

        <button id="start-btn" class="menu-btn" onclick="startGame()">ENTER THE FOREST</button>
        <button id="leaderboard-btn" class="menu-btn" onclick="showLeaderboard()">LEADERBOARD</button>
    </div>

    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <div id="final-score">Score: 0</div>
        <div id="score-submit-status" style="color: #ffff00; font-size: 1rem; margin-top: 5px;"></div>
        
        <button id="restart-btn" class="menu-btn" onclick="location.reload()">Try Again</button>
        <button id="leaderboard-btn-gameover" class="menu-btn" onclick="showLeaderboard()">LEADERBOARD</button>
    </div>

    <div id="leaderboard-screen">
        <h1 id="leaderboard-title">GLOBAL RANKING</h1>
        <div id="leaderboard-loading">Loading data...</div>
        <table id="leaderboard-table">
            <thead>
                <tr>
                    <th class="rank-col">#</th>
                    <th>HUNTER</th>
                    <th class="score-col">SCORE</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
        <button class="menu-btn" onclick="closeLeaderboard()">CLOSE</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        
        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- HYBRID DATA SETUP ---
        let app, auth, db, currentUser = null;
        let isOfflineMode = false;
        let appId = 'demon-hunter-v4';
        
        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                if (typeof __app_id !== 'undefined') appId = __app_id;
                
                // Initialize Auth
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        console.log("Hunter Authenticated:", user.uid);
                    }
                });
            } else {
                throw new Error("No config");
            }
        } catch (e) {
            console.log("Offline/Local Mode Activated");
            isOfflineMode = true;
        }
        
        let playerName = "";

        // --- AUDIO ENGINE START ---
        const AudioEngine = {
            ctx: null,
            bgmOscillators: [],
            isMuted: false,
            
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            // Basic synthesizer helper
            playTone: function(freq, type, duration, vol = 0.1, slideTo = null) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideTo) {
                    osc.frequency.exponentialRampToValueAtTime(slideTo, this.ctx.currentTime + duration);
                }

                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },

            // Noise generator (for slashes, explosions)
            playNoise: function(duration, filterFreq = 1000, vol = 0.2) {
                if (!this.ctx) return;
                const bufferSize = this.ctx.sampleRate * duration;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(filterFreq, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + duration);

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
            },

            // --- SPECIFIC SOUND EFFECTS ---

            slashMiss: function() {
                this.playNoise(0.2, 8000, 0.1); 
            },

            slashHit: function() {
                this.playNoise(0.15, 600, 0.3);
                this.playTone(100, 'sawtooth', 0.1, 0.1);
            },

            jump: function() {
                this.playTone(150, 'sine', 0.3, 0.1, 300);
            },

            smashImpact: function() {
                this.playTone(100, 'square', 0.5, 0.3, 30); 
                this.playNoise(0.5, 500, 0.4); 
            },

            bossCharge: function() {
                this.playTone(100, 'sawtooth', 1.0, 0.2, 200);
            },
            
            bossDash: function() {
                this.playNoise(0.5, 2000, 0.3);
                this.playTone(150, 'square', 0.3, 0.1, 50);
            },

            bossSmash: function() {
                this.playTone(60, 'square', 0.8, 0.4, 30);
                this.playNoise(0.8, 400, 0.5);
            },

            powerUp: function() {
                const now = this.ctx.currentTime;
                const notes = [440, 554, 659, 880]; // A Major
                notes.forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 'sine', 0.4, 0.1), i * 50);
                });
                setTimeout(() => this.playTone(880, 'triangle', 0.6, 0.1), 200);
            },
            
            damage: function() {
                this.playTone(150, 'sawtooth', 0.1, 0.2, 50);
            },

            victory: function() {
                // Extended Fanfare Melody
                const notes = [
                    {f: 523.25, d: 150}, // C
                    {f: 523.25, d: 150}, // C
                    {f: 523.25, d: 150}, // C (Triplet feel)
                    {f: 659.25, d: 400}, // E
                    {f: 783.99, d: 400}, // G
                    {f: 1046.50, d: 600}, // High C
                    {f: 783.99, d: 300}, // G
                    {f: 1046.50, d: 1000} // High C Final Long
                ];
                let delay = 0;
                notes.forEach(n => {
                    setTimeout(() => this.playTone(n.f, 'square', n.d/1000, 0.15), delay);
                    delay += n.d;
                });
                
                // Firework explosions synced
                setTimeout(() => this.smashImpact(), 200);
                setTimeout(() => this.smashImpact(), 500);
                setTimeout(() => this.smashImpact(), 800);
                setTimeout(() => this.smashImpact(), 1500);
            },

            // --- AMBIENT MUSIC (Procedural Loop) ---
            startMusic: function() {
                if (!this.ctx) return;
                
                // Chords: Cm -> Ab -> Bb -> G (Dark/Epic)
                const chords = [
                    [130.8, 155.5, 196.0], // Cm
                    [103.8, 129.8, 155.5], // Ab
                    [116.5, 146.8, 174.6], // Bb
                    [98.0, 123.5, 146.8]   // G
                ];

                let chordIndex = 0;
                
                const playChord = () => {
                    if(this.isMuted) return;
                    
                    const currentChord = chords[chordIndex];
                    currentChord.forEach(freq => {
                        // Pad Oscillator
                        const osc = this.ctx.createOscillator();
                        osc.type = 'sawtooth'; // Brass-like
                        osc.frequency.value = freq;
                        
                        // Lowpass to make it softer/ambient
                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 400;

                        const gain = this.ctx.createGain();
                        gain.gain.setValueAtTime(0, this.ctx.currentTime);
                        gain.gain.linearRampToValueAtTime(0.03, this.ctx.currentTime + 2); // Slow attack
                        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 7.5); // Long sustain/decay

                        osc.connect(filter);
                        filter.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start();
                        osc.stop(this.ctx.currentTime + 8);
                    });

                    // Bass drone
                    this.playTone(currentChord[0] / 2, 'sine', 8, 0.05);

                    chordIndex = (chordIndex + 1) % chords.length;
                    setTimeout(playChord, 8000); // Next chord in 8 seconds
                };

                playChord();
            }
        };
        // --- AUDIO ENGINE END ---

        // --- Configuration ---
        const config = {
            bgColor: 0x050520, 
            fogColor: 0x1a1a2e, 
            groundColor: 0x2a3d2a,
            moveSpeed: 0.3,
            runSpeed: 0.6,
            jumpForce: 0.8,
            smashJumpForce: 0.8, 
            gravity: 0.04,
            maxHP: 200, 
            powerUpDuration: 900, 
            mapLimit: 145,
            smashCooldownTime: 480 
        };

        // --- Global Variables ---
        let scene, camera, renderer;
        let player, playerVelocity, playerOnGround = false;
        let terrainMesh; 
        let keyState = {};
        let cameraAngle = 0;
        let cameraVertical = 0.5;
        
        // Game State
        let enemies = [];
        let apples = []; 
        let waterSwords = []; 
        let fireSwords = []; 
        let slashEffects = []; 
        let clawEffects = []; 
        let smashEffects = [];
        let bloodSplashes = [];
        let fireworks = []; 
        let score = 0;
        let nextBossScore = 100;
        let playerHP = config.maxHP;

        async function saveScoreToFirebase(name, scoreVal) {
            const statusEl = document.getElementById('score-submit-status');
            
            if (isOfflineMode) {
                // --- LOCAL STORAGE SAVE ---
                statusEl.innerText = "Saving to local archives...";
                try {
                    let scores = [];
                    const localData = localStorage.getItem('demonHunterScores');
                    if (localData) scores = JSON.parse(localData);
                    
                    scores.push({ name: name, score: scoreVal, timestamp: Date.now() });
                    // Keep strictly top 50 locally to save space
                    scores.sort((a, b) => b.score - a.score);
                    scores = scores.slice(0, 50);
                    
                    localStorage.setItem('demonHunterScores', JSON.stringify(scores));
                    statusEl.innerText = "Recorded Locally.";
                } catch(e) {
                    statusEl.innerText = "Save Failed.";
                }
            } else {
                // --- FIREBASE SAVE ---
                if (!currentUser) return;
                statusEl.innerText = "Saving legacy...";
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'), {
                        name: name,
                        score: scoreVal,
                        timestamp: Date.now(),
                        userId: currentUser.uid
                    });
                    statusEl.innerText = "Legacy Recorded.";
                } catch (e) {
                    console.error("Error saving score:", e);
                    statusEl.innerText = "Connection Failed.";
                }
            }
        }
