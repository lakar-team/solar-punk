<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamの外気温度補正</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f8f9fa;
            --panel: #ffffff;
            --text: #333;
            --ghp: #e67e22;
            --ehp: #2980b9;
            --ghp-light: #fdf2e9;
            --ehp-light: #eaf4fb;
        }
        body {
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--panel);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 950px;
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            background: #e0e0e0;
            border-bottom: 1px solid #ccc;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.2s;
            font-size: 0.85rem;
            min-width: 140px;
            line-height: 1.4;
        }
        .tab-btn:hover { background: #d0d0d0; }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-bottom: 4px solid var(--accent);
        }

        /* --- Content Area --- */
        .content {
            padding: 30px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .content.active { display: block; }
        
        .graph-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Main Dashboard Styles --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr; /* Adjusted for larger summary */
            gap: 30px;
        }
        .card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .card h3 { 
            margin-top: 0; 
            color: var(--primary); 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 0.9rem;}
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box; 
        }
        
        /* Button Group Updates */
        .btn-group { display: flex; gap: 10px; }
        .type-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            background: #f8f9fa;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            color: #777;
        }
        /* Explicit Active States */
        .type-btn.ghp.active { 
            background: var(--ghp); 
            color: white; 
            border-color: var(--ghp); 
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3);
        }
        .type-btn.ehp.active { 
            background: var(--ehp); 
            color: white; 
            border-color: var(--ehp);
            box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3);
        }

        /* --- New Summary Grid Design --- */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        .summary-box {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #fff;
            transition: transform 0.2s;
        }
        .summary-box:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        .sum-title { font-size: 0.8rem; font-weight: bold; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; min-height: 2.4em; display:flex; align-items:center; justify-content:center;}
        
        .sum-cond-label { font-size: 0.75rem; color: #999; margin-bottom: 2px; }
        .sum-cond-val { font-size: 1rem; font-weight: 600; color: #333; margin-bottom: 10px; }
        
        .sum-result {
            display: block;
            font-family: 'Consolas', monospace; 
            font-size: 1.6rem;
            font-weight: bold;
            padding: 10px 5px;
            border-radius: 6px;
            color: #fff;
            margin-top: auto;
        }

        /* --- Graph Specific --- */
        .graph-header-box {
            text-align: center;
            background: #f0f4f8;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary);
            border: 1px solid #dcebf7;
        }
        
        .graph-wrapper {
            position: relative;
            height: 500px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            background: white;
        }
        .remarks-box {
            margin-top: 15px;
            padding: 10px;
            background: #fff8e1;
            border: 1px solid #ffe0b2;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #795548;
        }
        .slider-group {
            background: #f1f8ff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #d0e1f5;
            margin-bottom: 20px;
        }
        .data-list .data-row {
            display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0;
            font-size: 0.8rem;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px;}

        @media (max-width: 768px) {
            .graph-layout, .dashboard-grid { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr 1fr; } /* Keep 2x2 on mobile if possible, or 1fr */
            .tab-btn { flex: 1 1 50%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('main')">MAIN / メイン<br>Location & Summary</button>
        <button class="tab-btn" onclick="switchTab('5-22')">Fig 5-22<br>Cooling (冷房)</button>
        <button class="tab-btn" onclick="switchTab('5-23')">Fig 5-23<br>Heating (暖房)</button>
        <button class="tab-btn" onclick="switchTab('5-24')">Fig 5-24<br>Cooling (冷房)</button>
        <button class="tab-btn" onclick="switchTab('5-25')">Fig 5-25<br>Heating (暖房)</button>
    </div>

    <div id="tab-main" class="content active">
        <div class="dashboard-grid">
            <div class="card">
                <h3>1. Conditions Setting / 条件設定</h3>
                
                <div class="form-group">
                    <label>Location (City) / 地域 (都市)</label>
                    <select id="citySelect" class="form-control" onchange="updateDashboard()">
                        </select>
                    <div id="cityInfo" style="margin-top:12px; font-size:0.9em; color:#555; line-height:1.6; background:#f4f4f4; padding:10px; border-radius:4px;"></div>
                </div>

                <div class="form-group">
                    <label>Equipment Type / 機器タイプ</label>
                    <div class="btn-group">
                        <button class="type-btn ghp active" id="btnGHP" onclick="setAcType('GHP')">GHP</button>
                        <button class="type-btn ehp" id="btnEHP" onclick="setAcType('EHP')">EHP</button>
                    </div>
                </div>

                <div class="form-group" style="display:flex; gap:15px;">
                    <div style="flex:1;">
                        <label>Indoor Intake Temp (Cooling)<br>室内吸込温度 (冷房) (°C)</label>
                        <input type="number" id="inCool" class="form-control" value="19" oninput="updateDashboard()">
                    </div>
                    <div style="flex:1;">
                        <label>Indoor Intake Temp (Heating)<br>室内吸込温度 (暖房) (°C)</label>
                        <input type="number" id="inHeat" class="form-control" value="20" oninput="updateDashboard()">
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>2. Efficiency Summary / 効率サマリー</h3>
                
                <div class="summary-grid" id="summaryGrid">
                    </div>

                <p style="margin-top:20px; font-size:0.8em; color:#999; text-align:center;">
                    *Calculated based on city climate & curve.<br>
                    *選択された都市の気象データと機器カーブに基づく計算値。
                </p>
            </div>
        </div>
    </div>

    <div id="tab-graph" class="content">
        <div id="graphHeader" class="graph-header-box"></div>

        <div class="graph-layout">
            <div class="graph-wrapper">
                <canvas id="chartCanvas"></canvas>
            </div>
            <div class="control-panel">
                <div class="slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-weight:bold; color:var(--primary);">
                        <span id="axisLabel">Temp</span>
                        <span id="tempDisplay">-- °C</span>
                    </div>
                    <input type="range" id="tempSlider" step="0.1" oninput="manualSliderChange()">
                    <div style="font-size:0.8em; color:#666; margin-top:5px; text-align:right;">
                        (Manual Override / 手動調整)
                    </div>
                </div>
                
                <div class="data-list" id="outputList"></div>

                <div id="graphRemarks" class="remarks-box"></div>
            </div>
        </div>
    </div>

</div>

        },
        {

            header: "室内吸込空気温度による補正 (屋内機)<br>(Correction by indoor intake air temperature - Indoor unit)",

            labelShort: "Heating / Indoor<br>暖房 / 室内",
            xLabel: "室内吸込空気温度 (DB) [°C]<br>(Indoor intake air temperature (DB) [°C])",
            yLabel: "能力比及び入力比 [%]<br>(Capacity ratio and Input ratio [%])",
            remarks: "Outdoor Condition: 外気吸込温度 (Outdoor intake temperature): 6°C (WB)",
            xRange: [12, 28],
            lines: [
                { name: "暖房能力 GHP (Heating capacity GHP)", type:"GHP", mode:"Cap", color: "#e67e22", data: [{x:12,y:101.9},{x:13,y:101.7},{x:14,y:101.4},{x:15,y:101.2},{x:16,y:101.0},{x:17,y:100.7},{x:18,y:100.5},{x:19,y:100.2},{x:20,y:100},{x:21,y:96.5},{x:22,y:93.0},{x:23,y:89.5},{x:24,y:86.1},{x:25,y:82.6},{x:26,y:79.1},{x:27,y:75.6},{x:28,y:72.1}] },

                { name: "暖房能力 EHP (Heating capacity EHP)", type:"EHP", mode:"Cap", color: "#2980b9", data: [{x:12,y:100.3},{x:13,y:100.3},{x:14,y:100.2},{x:15,y:100.2},{x:16,y:100.1},{x:17,y:100.1},{x:18,y:100},{x:19,y:100},{x:20,y:99.9},{x:21,y:95.9},{x:22,y:91.8},{x:23,y:87.8},{x:24,y:83.7},{x:25,y:79.7},{x:26,y:75.6},{x:27,y:71.6},{x:28,y:67.5}] },
                { name: "入力 EHP (Input EHP)",    type:"EHP", mode:"Input", color: "#3498db", dash:[5,5], data: [{x:12,y:121},{x:13,y:121.1},{x:14,y:121.2},{x:15,y:121.3},{x:16,y:121.4},{x:17,y:116.1},{x:18,y:110.7},{x:19,y:105.4},{x:20,y:100},{x:21,y:95.9},{x:22,y:91.9},{x:23,y:87.8},{x:24,y:83.8},{x:25,y:79.7},{x:26,y:75.6},{x:27,y:71.6},{x:28,y:67.5}] }
            ]
        }
    ];

    // --- 3. STATE & INIT ---
    let currentState = {
        cityIndex: 0,
        acType: 'GHP',
        indoorCool: 19,
        indoorHeat: 20,
        calculatedValues: {}
    };

    let chartInstance = null;
    let currentGraphId = 'main';

    function init() {
        const sel = document.getElementById('citySelect');
        // rawCityData is already sorted above
        rawCityData.forEach((c, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.text = `${c[0]} / ${c[1]}`;
            sel.appendChild(opt);
        });
        
        // Find Sendai index in the sorted list
        const sendaiIdx = rawCityData.findIndex(c => c[0] === 'Sendai');
        sel.value = sendaiIdx >= 0 ? sendaiIdx : 0; 
        
        updateDashboard();
    }

    // --- 4. LOGIC ---
    function setAcType(type) {
        currentState.acType = type;
        
        const ghpBtn = document.getElementById('btnGHP');
        const ehpBtn = document.getElementById('btnEHP');
        
        if (type === 'GHP') {
            ghpBtn.classList.add('active');
            ehpBtn.classList.remove('active');
        } else {
            ghpBtn.classList.remove('active');
            ehpBtn.classList.add('active');
        }
        
        updateDashboard();
    }

    function updateDashboard() {
        const idx = document.getElementById('citySelect').value;
        currentState.cityIndex = idx;
        const city = rawCityData[idx]; // [En, Jp, CoolDB, HeatWB, HeatRH]
        
        currentState.indoorCool = parseFloat(document.getElementById('inCool').value) || 19;
        currentState.indoorHeat = parseFloat(document.getElementById('inHeat').value) || 20;

        // Display City Conditions
        const infoDiv = document.getElementById('cityInfo');
        infoDiv.innerHTML = `
            <div><b>${city[0]} (${city[1]})</b></div>
            <div style="margin-top:5px;">Cooling Outdoor: <b>${city[2]}°C</b> (DB)</div>
            <div>Heating Outdoor: <b>${city[3]}°C</b> (WB) / RH: <b>${city[4]}%</b></div>
        `;

        const useHighHumid = city[4] >= 65;

        // Calculate for all 4 graphs
        const results = [];
        
        // Graph 5-22 (Cool/Out)
        let g = graphs[0];
        let xVal = city[2];
        let lines = g.lines.filter(l => l.type === currentState.acType);
        lines.forEach(l => {
            let y = interp(l.data, xVal);
            results.push({ id: g.id, label: l.name, x: xVal, y: y, graphName: g.labelShort });
        });

        // Graph 5-23 (Heat/Out)
        g = graphs[1];
        xVal = city[3];
        lines = g.lines.filter(l => l.type === currentState.acType);
        if(currentState.acType === 'EHP') {
            lines = lines.filter(l => {
                if(l.mode === 'Input') return true;
                if(useHighHumid && l.mode === 'CapHi') return true;
                if(!useHighHumid && l.mode === 'CapLo') return true;
                return false;
            });
        }
        lines.forEach(l => {
            let y = interp(l.data, xVal);
            results.push({ id: g.id, label: l.name, x: xVal, y: y, graphName: g.labelShort });
        });

        // Graph 5-24 (Cool/In)
        g = graphs[2];
        xVal = currentState.indoorCool;
        lines = g.lines.filter(l => l.type === currentState.acType);
        lines.forEach(l => {
            let y = interp(l.data, xVal);
            results.push({ id: g.id, label: l.name, x: xVal, y: y, graphName: g.labelShort });
        });

        // Graph 5-25 (Heat/In)
        g = graphs[3];
        xVal = currentState.indoorHeat;
        lines = g.lines.filter(l => l.type === currentState.acType);
        lines.forEach(l => {
            let y = interp(l.data, xVal);
            results.push({ id: g.id, label: l.name, x: xVal, y: y, graphName: g.labelShort });
        });

        currentState.calculatedValues = results;

        // Render Summary Grid (New Design)
        renderSummaryGrid(results, useHighHumid);
        
        if(currentGraphId !== 'main') {
            renderGraphTab(currentGraphId);
        }
    }

    function renderSummaryGrid(results, useHighHumid) {
        const grid = document.getElementById('summaryGrid');
        grid.innerHTML = '';

        // Group results by graphName
        const grouped = {};
        results.forEach(r => {
            if(!grouped[r.graphName]) grouped[r.graphName] = [];
            grouped[r.graphName].push(r);
        });

        // We know the order: 5-22, 5-23, 5-24, 5-25
        const orderIds = ["5-22", "5-23", "5-24", "5-25"];

        orderIds.forEach(gid => {
            const gDef = graphs.find(g => g.id === gid);
            const items = grouped[gDef.labelShort];
            if (!items) return;

            // Prepare display values
            // Graph Label (Dual Lang)
            const title = gDef.labelShort;
            
            // Condition Value
            let condVal = `${items[0].x.toFixed(1)}°C`;
            if (gid === "5-23" && currentState.acType === 'EHP') {
                condVal += ` <span style="font-size:0.8em; font-weight:normal">(RH${useHighHumid?'>65%':'<65%'})</span>`;
            }

            // Result Value (The Capacity Ratio)
            // We usually want to show the "Capacity" line primarily, or map all.
            // For the big box, let's show Capacity. 
            const capItem = items.find(i => i.label.includes('Capacity') || i.label.includes('能力'));
            const resultVal = capItem ? capItem.y.toFixed(1) + '%' : '--';

            // Box Color
            const boxColor = currentState.acType === 'GHP' ? 'var(--ghp)' : 'var(--ehp)';

            const div = document.createElement('div');
            div.className = 'summary-box';
            div.innerHTML = `
                <div class="sum-title">${title}</div>
                <div class="sum-cond-label">Condition:</div>
                <div class="sum-cond-val">${condVal}</div>
                <div class="sum-result" style="background:${boxColor}">
                    Efficiency: ${resultVal}
                </div>
            `;
            grid.appendChild(div);
        });
    }

    // --- 5. UI: Tab Switching & Graph Rendering ---
    function switchTab(id) {
        currentGraphId = id;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        
        if(id === 'main') {
            document.getElementById('tab-main').classList.add('active');
        } else {
            document.getElementById('tab-graph').classList.add('active');
            renderGraphTab(id);
        }
    }

    function renderGraphTab(id) {
        const gDef = graphs.find(g => g.id === id);
        if(!gDef) return;

        // UPDATE HEADERS & TEXT
        document.getElementById('graphHeader').innerHTML = gDef.header;
        document.getElementById('graphRemarks').innerText = gDef.remarks;

        const city = rawCityData[currentState.cityIndex];
        
        let displayLines = [];
        if(id === '5-23' && currentState.acType === 'EHP') {
            displayLines = gDef.lines.filter(l => l.type === 'EHP');
        } else {
            displayLines = gDef.lines.filter(l => l.type === currentState.acType);
        }

        // Determine Current Point (X)
        let currentX = 0;
        if(id === '5-22') currentX = city[2];
        else if(id === '5-23') currentX = city[3];
        else if(id === '5-24') currentX = currentState.indoorCool;
        else if(id === '5-25') currentX = currentState.indoorHeat;

        // Setup Slider
        const slider = document.getElementById('tempSlider');
        slider.min = gDef.xRange[0];
        slider.max = gDef.xRange[1];
        slider.value = currentX;
        
        document.getElementById('axisLabel').innerHTML = gDef.xLabel.split('<br>')[0];
        document.getElementById('tempDisplay').innerText = parseFloat(currentX).toFixed(1) + " °C";

        // Generate Datasets
        const datasets = displayLines.map(l => ({
            label: l.name,
            data: l.data,
            borderColor: l.color,
            borderDash: l.dash || [],
            borderWidth: 2.5,
            pointRadius: 0,
            tension: 0.1,
            order: 2
        }));

        // Red Dot Logic
        const useHighHumid = city[4] >= 65;
        const pointData = [];
        displayLines.forEach(l => {
            if(id === '5-23' && currentState.acType === 'EHP') {
                if(l.mode === 'CapHi' && !useHighHumid) return;
                if(l.mode === 'CapLo' && useHighHumid) return;
            }
            pointData.push({ x: currentX, y: interp(l.data, currentX) });
        });

        datasets.push({
            label: 'Current Point / 現在点',
            data: pointData,
            backgroundColor: '#e74c3c',
            borderColor: '#e74c3c',
            pointRadius: 6,
            pointHoverRadius: 8,
            showLine: false,
            order: 1
        });

        if(chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('chartCanvas').getContext('2d');
        
        const xTitle = gDef.xLabel.replace('<br>', ' ');
        const yTitle = gDef.yLabel.replace('<br>', ' ');

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        type: 'linear', 
                        min: gDef.xRange[0], 
                        max: gDef.xRange[1], 
                        title: {display:true, text: xTitle.split(' '), font:{size:11}}
                    },
                    y: { 
                        title: { display: true, text: yTitle.split(' '), font:{size:11} } 
                    }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: {size: 10} } },
                    title: { display: true, text: gDef.title, font: {size: 16} }
                }
            }
        });

        updateList(displayLines, currentX);
    }

    function manualSliderChange() {
        const val = parseFloat(document.getElementById('tempSlider').value);
        document.getElementById('tempDisplay').innerText = val.toFixed(1) + " °C";
        
        if(chartInstance) {
            const datasets = chartInstance.data.datasets;
            const dotSet = datasets[datasets.length-1];
            const lines = datasets.slice(0, datasets.length-1);
            
            const city = rawCityData[currentState.cityIndex];
            const useHighHumid = city[4] >= 65;
            const currentId = currentGraphId;

            const finalDots = [];
            lines.forEach(l => {
                let skip = false;
                if(currentId === '5-23' && currentState.acType === 'EHP') {
                    if(l.label.includes('80%') && !useHighHumid) skip = true;
                    if(l.label.includes('50%') && useHighHumid) skip = true;
                }
                if(!skip) finalDots.push({ x: val, y: interp(l.data, val) });
            });
             
            dotSet.data = finalDots;
            chartInstance.update();
        }
        
        const validSets = chartInstance.data.datasets.filter(d => d.label !== 'Current Point / 現在点');
        updateListFromDatasets(validSets, val);
    }

    function updateList(lines, x) {
        const list = document.getElementById('outputList');
        list.innerHTML = "";
        lines.forEach(l => {
            const y = interp(l.data, x);
            const row = document.createElement('div');
            row.className = "data-row";
            row.innerHTML = `
                <div style="display:flex; align-items:center; max-width:80%;">
                    <span class="dot" style="background:${l.color}"></span>
                    <span>${l.name}</span>
                </div>
                <div class="val-cell">${y.toFixed(1)}%</div>
            `;
            list.appendChild(row);
        });
    }

    function updateListFromDatasets(datasets, x) {
         const list = document.getElementById('outputList');
        list.innerHTML = "";
        datasets.forEach(d => {
            const y = interp(d.data, x);
            const row = document.createElement('div');
            row.className = "data-row";
            row.innerHTML = `
                <div style="display:flex; align-items:center; max-width:80%;">
                    <span class="dot" style="background:${d.borderColor}"></span>
                    <span>${d.label}</span>
                </div>
                <div class="val-cell">${y.toFixed(1)}%</div>
            `;
            list.appendChild(row);
        });
    }

    function interp(data, x) {
        if (x <= data[0].x) return data[0].y;
        if (x >= data[data.length-1].x) return data[data.length-1].y;
        for (let i = 0; i < data.length - 1; i++) {
            if (x >= data[i].x && x <= data[i+1].x) {
                const ratio = (x - data[i].x) / (data[i+1].x - data[i].x);
                return data[i].y + ratio * (data[i+1].y - data[i].y);
            }
        }
        return 0;
    }

    window.onload = init;

</script>
